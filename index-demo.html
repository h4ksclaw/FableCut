<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FableCut — MCP Recipe Viewer</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<meta name="theme-color" content="#0e0e10">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0e0e10; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; }

  /* Top bar */
  .topbar { display: flex; align-items: center; gap: 12px; padding: 8px 16px; background: #161618; border-bottom: 1px solid #2a2a2e; height: 48px; }
  .logo { font-size: 18px; font-weight: 700; color: #7b6cff; white-space: nowrap; }
  .logo b { color: #fff; }
  .url-bar { flex: 1; display: flex; gap: 8px; align-items: center; }
  .url-bar input { flex: 1; background: #0a0a0c; border: 1px solid #333; color: #e0e0e0; padding: 6px 12px; border-radius: 6px; font-size: 13px; outline: none; }
  .url-bar input:focus { border-color: #7b6cff; }
  .url-bar input::placeholder { color: #555; }
  .btn { background: #7b6cff; color: #fff; border: none; padding: 6px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; white-space: nowrap; }
  .btn:hover { background: #6a5bef; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn.ghost { background: transparent; border: 1px solid #333; }
  .btn.ghost:hover { border-color: #555; background: #1a1a1e; }

  /* Status pill */
  .status { font-size: 12px; color: #888; padding: 2px 10px; border-radius: 12px; background: #1a1a1e; }
  .status.ok { color: #4ade80; }
  .status.err { color: #ef4444; }
  .status.loading { color: #fbbf24; }

  /* Project info */
  .project-info { display: flex; gap: 16px; padding: 6px 16px; background: #111113; border-bottom: 1px solid #2a2a2e; font-size: 12px; color: #888; align-items: center; }
  .project-info .tag { background: #1e1e22; padding: 2px 8px; border-radius: 4px; color: #aaa; }
  .project-info b { color: #e0e0e0; }

  /* Main layout */
  .main { display: flex; height: calc(100vh - 48px - 32px); }
  
  /* Preview */
  .preview-pane { flex: 1; display: flex; flex-direction: column; background: #000; position: relative; }
  .preview-container { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .preview-canvas-wrap { position: relative; max-width: 100%; max-height: 100%; }
  #previewCanvas { max-width: 100%; max-height: 100%; background: #000; border-radius: 4px; }
  .preview-meta { position: absolute; top: 8px; right: 12px; font-size: 11px; color: #666; }

  /* Transport */
  .transport { display: flex; align-items: center; gap: 8px; padding: 8px 16px; background: #161618; border-top: 1px solid #2a2a2e; justify-content: center; }
  .transport button { background: #1e1e22; border: 1px solid #333; color: #e0e0e0; width: 36px; height: 36px; border-radius: 6px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
  .transport button:hover { background: #2a2a2e; border-color: #555; }
  .timecode { font-family: 'SF Mono', monospace; font-size: 13px; color: #aaa; min-width: 80px; text-align: center; }
  .timeline-slider { flex: 1; max-width: 400px; height: 6px; -webkit-appearance: none; appearance: none; background: #333; border-radius: 3px; outline: none; cursor: pointer; }
  .timeline-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #7b6cff; cursor: pointer; }

  /* Inspector / Clips panel */
  .clips-pane { width: 320px; background: #131316; border-left: 1px solid #2a2a2e; overflow-y: auto; padding: 12px; }
  .clips-pane h3 { font-size: 12px; text-transform: uppercase; color: #666; margin-bottom: 8px; letter-spacing: 1px; }
  .clip-card { background: #1a1a1e; border: 1px solid #2a2a2e; border-radius: 8px; padding: 10px; margin-bottom: 8px; cursor: pointer; transition: border-color .15s; }
  .clip-card:hover { border-color: #7b6cff; }
  .clip-card .clip-type { font-size: 11px; text-transform: uppercase; color: #7b6cff; font-weight: 600; }
  .clip-card .clip-track { font-size: 11px; color: #666; float: right; }
  .clip-card .clip-name { font-size: 13px; color: #ddd; margin-top: 4px; }
  .clip-card .clip-time { font-size: 11px; color: #888; margin-top: 4px; font-family: monospace; }
  .clip-card .clip-props { font-size: 11px; color: #666; margin-top: 4px; }

  /* Timeline */
  .timeline-pane { height: 200px; background: #111113; border-top: 1px solid #2a2a2e; overflow-x: auto; overflow-y: auto; }
  .timeline-header { position: sticky; top: 0; display: flex; align-items: center; gap: 12px; padding: 6px 12px; background: #161618; border-bottom: 1px solid #2a2a2e; z-index: 10; font-size: 12px; color: #888; }
  .timeline-ruler { position: relative; height: 24px; background: #131316; border-bottom: 1px solid #2a2a2e; }
  .timeline-tracks { position: relative; min-height: 140px; }
  .track-row { display: flex; align-items: center; height: 32px; border-bottom: 1px solid #1a1a1e; }
  .track-label { width: 40px; text-align: center; font-size: 11px; font-weight: 600; color: #555; border-right: 1px solid #2a2a2e; flex-shrink: 0; }
  .track-content { position: relative; flex: 1; height: 100%; }
  .track-clip { position: absolute; height: 28px; top: 2px; border-radius: 4px; padding: 0 6px; font-size: 11px; color: #fff; display: flex; align-items: center; overflow: hidden; white-space: nowrap; cursor: pointer; border: 1px solid rgba(255,255,255,.1); }
  .track-clip.video { background: linear-gradient(135deg, #4f8cff, #3a6fdb); }
  .track-clip.audio { background: linear-gradient(135deg, #4ade80, #36b86b); }
  .track-clip.text { background: linear-gradient(135deg, #fbbf24, #d99919); }
  .track-clip.image { background: linear-gradient(135deg, #a78bfa, #8b6ce8); }

  /* Loading overlay */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.9); z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 20px; }
  .overlay h2 { font-size: 22px; color: #7b6cff; font-weight: 700; }
  .overlay .sub { font-size: 14px; color: #aaa; }
  .overlay .bar-wrap { width: 300px; height: 4px; background: #333; border-radius: 2px; overflow: hidden; }
  .overlay .bar { height: 100%; background: #7b6cff; transition: width .3s; }
  .spinner { width: 40px; height: 40px; border: 3px solid #333; border-top-color: #7b6cff; border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- Top bar -->
<header class="topbar">
  <div class="logo">▶ Fable<b>Cut</b> · MCP</div>
  <div class="url-bar">
    <input type="text" id="urlInput" placeholder="Recipe ID (e.g. 2c9d1f6c90ec) or full URL" />
    <button class="btn" id="btnLoad">Load</button>
  </div>
  <div class="status" id="status">Ready</div>
</header>

<!-- Project info -->
<div class="project-info" id="projectInfo" style="display:none;">
  <span class="tag" id="infoTool">—</span>
  <span>📐 <b id="infoResolution">—</b></span>
  <span>🎬 <b id="infoFps">—</b> fps</span>
  <span>📁 <b id="infoClips">—</b> clips</span>
  <span>🎥 <b id="infoMedia">—</b> media</span>
</div>

<!-- Preview -->
<div class="main" style="flex-direction: column;">
  <div class="preview-pane" style="flex: 1;">
    <div class="preview-container">
      <div class="preview-canvas-wrap">
        <video id="previewVideo" style="max-width: 100%; max-height: 70vh; display:none;" controls></video>
        <div id="previewPlaceholder" style="color: #444; font-size: 18px; text-align: center;">
          Load a recipe to preview
        </div>
        <div class="preview-meta" id="previewMeta"></div>
      </div>
    </div>
    
    <!-- Clips inspector -->
    <div class="clips-pane" id="clipsPane" style="display:none; width: 100%; max-height: 200px;">
      <h3>Clips</h3>
      <div id="clipsList"></div>
    </div>
  </div>

  <!-- Timeline -->
  <div class="timeline-pane" id="timelinePane" style="display:none;">
    <div class="timeline-header">
      <span>📊 Timeline</span>
      <span style="margin-left: auto; font-family: monospace;" id="timelineDuration">0.0s</span>
    </div>
    <div class="timeline-ruler" id="timelineRuler"></div>
    <div class="timeline-tracks" id="timelineTracks"></div>
  </div>
</div>

<!-- Loading overlay -->
<div class="overlay" id="overlay" style="display:none;">
  <div class="spinner"></div>
  <h2 id="overlayTitle">Loading...</h2>
  <div class="sub" id="overlaySub"></div>
  <div class="bar-wrap"><div class="bar" id="overlayBar" style="width:0%"></div></div>
</div>

<script src="mcp-client.js"></script>
<script>
/* ═══════════════════════════════════════════════════════════════════════════
   MCP Recipe Viewer — client-side only, works on GitHub Pages
   ═══════════════════════════════════════════════════════════════════════════ */

let currentProject = null;

const $ = id => document.getElementById(id);
const status = (msg, cls) => { const s = $('status'); s.textContent = msg; s.className = 'status ' + (cls || ''); };

function showOverlay(title, sub, progress) {
  $('overlay').style.display = 'flex';
  $('overlayTitle').textContent = title;
  $('overlaySub').textContent = sub || '';
  if (progress !== undefined) $('overlayBar').style.width = (progress * 100) + '%';
}
function hideOverlay() {
  $('overlay').style.opacity = '0';
  $('overlay').style.transition = 'opacity .3s';
  setTimeout(() => { $('overlay').style.display = 'none'; $('overlay').style.opacity = '1'; }, 300);
}

/* ── Load recipe from URL param or input ── */
async function loadRecipe(projectId) {
  if (!projectId) return;
  
  showOverlay('Importing Recipe', 'Fetching: ' + projectId, 0.1);
  status('Loading...', 'loading');

  try {
    const result = await McpClient.importRecipe(projectId);
    currentProject = result.project;
    
    showOverlay('Converting...', `${currentProject.clips.length} clips, ${currentProject.media.length} media`, 0.5);
    
    // Render UI
    renderProjectInfo(result.recipe, currentProject);
    renderClips(currentProject.clips);
    renderTimeline(currentProject);
    loadPreview(currentProject);
    
    showOverlay('Ready!', '', 1);
    setTimeout(hideOverlay, 500);
    
    status(`Loaded: ${currentProject.clips.length} clips`, 'ok');
    
    // Update URL
    const newUrl = new URL(location.href);
    newUrl.searchParams.set('project', projectId);
    history.replaceState(null, '', newUrl);
    
  } catch (e) {
    hideOverlay();
    status('Error: ' + e.message, 'err');
    $('previewPlaceholder').textContent = 'Error: ' + e.message;
    $('previewPlaceholder').style.color = '#ef4444';
  }
}

function renderProjectInfo(recipe, project) {
  const tool = recipe.tool || 'unknown';
  $('infoTool').textContent = tool;
  $('infoResolution').textContent = `${project.width}×${project.height}`;
  $('infoFps').textContent = project.fps;
  $('infoClips').textContent = project.clips.length;
  $('infoMedia').textContent = project.media.length;
  $('projectInfo').style.display = 'flex';
}

function renderClips(clips) {
  const list = $('clipsList');
  list.innerHTML = '';
  
  for (const clip of clips) {
    const card = document.createElement('div');
    card.className = 'clip-card';
    
    const typeEl = document.createElement('div');
    typeEl.className = 'clip-type';
    typeEl.textContent = clip.kind;
    
    const trackEl = document.createElement('div');
    trackEl.className = 'clip-track';
    trackEl.textContent = clip.track;
    typeEl.appendChild(trackEl);
    card.appendChild(typeEl);
    
    const name = document.createElement('div');
    name.className = 'clip-name';
    const props = clip.props || {};
    if (props.text) {
      name.textContent = props.text.substring(0, 60) + (props.text.length > 60 ? '...' : '');
    } else {
      name.textContent = clip.name || clip.kind;
    }
    card.appendChild(name);
    
    const time = document.createElement('div');
    time.className = 'clip-time';
    time.textContent = `${clip.start.toFixed(1)}s → ${(clip.start + clip.duration).toFixed(1)}s (${clip.duration.toFixed(1)}s)`;
    if (clip.in) time.textContent += ` · source in: ${clip.in}s`;
    card.appendChild(time);
    
    if (clip.mediaId) {
      const media = currentProject.media.find(m => m.id === clip.mediaId);
      if (media) {
        const src = document.createElement('div');
        src.className = 'clip-props';
        src.textContent = `📎 ${media.name} · ${media.src.substring(0, 60)}...`;
        card.appendChild(src);
      }
    }
    
    list.appendChild(card);
  }
  
  $('clipsPane').style.display = 'block';
}

function renderTimeline(project) {
  const tracks = $('timelineTracks');
  tracks.innerHTML = '';
  
  // Find max time
  const maxTime = Math.max(...project.clips.map(c => c.start + c.duration), 10);
  const pxPerSec = 30; // 30px per second
  
  // Track rows
  const trackNames = ['V4', 'V3', 'V2', 'V1', 'A1', 'A2', 'A3'];
  for (const trackName of trackNames) {
    const row = document.createElement('div');
    row.className = 'track-row';
    
    const label = document.createElement('div');
    label.className = 'track-label';
    label.textContent = trackName;
    row.appendChild(label);
    
    const content = document.createElement('div');
    content.className = 'track-content';
    content.style.width = (maxTime * pxPerSec) + 'px';
    
    // Clips on this track
    for (const clip of project.clips.filter(c => c.track === trackName)) {
      const clipEl = document.createElement('div');
      clipEl.className = `track-clip ${clip.kind}`;
      clipEl.style.left = (clip.start * pxPerSec) + 'px';
      clipEl.style.width = (clip.duration * pxPerSec - 2) + 'px';
      
      const props = clip.props || {};
      const labelText = props.text 
        ? props.text.substring(0, 30) + (props.text.length > 30 ? '...' : '')
        : (clip.name || clip.kind);
      clipEl.textContent = labelText;
      clipEl.title = `${clip.kind} on ${trackName}: ${clip.start}s - ${clip.start + clip.duration}s`;
      
      content.appendChild(clipEl);
    }
    
    row.appendChild(content);
    tracks.appendChild(row);
  }
  
  // Ruler
  const ruler = $('timelineRuler');
  ruler.innerHTML = '';
  ruler.style.width = (maxTime * pxPerSec + 50) + 'px';
  for (let t = 0; t <= maxTime; t += Math.max(1, Math.ceil(maxTime / 20))) {
    const tick = document.createElement('div');
    tick.style.position = 'absolute';
    tick.style.left = (t * pxPerSec) + 'px';
    tick.style.fontSize = '10px';
    tick.style.color = '#444';
    tick.style.paddingLeft = '2px';
    tick.textContent = t + 's';
    ruler.appendChild(tick);
  }
  
  $('timelineDuration').textContent = maxTime.toFixed(1) + 's';
  $('timelinePane').style.display = 'block';
}

function loadPreview(project) {
  // Find first video clip with media
  const videoClip = project.clips.find(c => c.kind === 'video' && c.mediaId);
  if (!videoClip) {
    $('previewVideo').style.display = 'none';
    $('previewPlaceholder').style.display = 'block';
    $('previewPlaceholder').textContent = 'No video clips to preview';
    return;
  }
  
  const media = project.media.find(m => m.id === videoClip.mediaId);
  if (!media) return;
  
  const video = $('previewVideo');
  video.src = media.src;
  video.style.display = 'block';
  $('previewPlaceholder').style.display = 'none';
  
  // Set in point
  video.addEventListener('loadedmetadata', () => {
    if (videoClip.in) video.currentTime = videoClip.in;
    $('previewMeta').textContent = `${project.width}×${project.height} · ${project.fps}fps`;
  }, { once: true });
}

/* ── Event handlers ── */
$('btnLoad').addEventListener('click', () => {
  let val = $('urlInput').value.trim();
  if (!val) return;
  
  // Extract ID from URL or use directly
  const match = val.match(/([a-f0-9]{12})/i);
  if (match) val = match[1];
  
  loadRecipe(val);
});

$('urlInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') $('btnLoad').click();
});

/* ── Auto-load from URL param ── */
const params = new URLSearchParams(location.search);
const autoId = params.get('project') || params.get('mcp');
if (autoId) {
  $('urlInput').value = autoId;
  loadRecipe(autoId);
}

/* ── Also check hash ── */
if (!autoId && location.hash.length > 1) {
  const hashId = location.hash.substring(1);
  if (/^[a-f0-9]{12}$/i.test(hashId)) {
    $('urlInput').value = hashId;
    loadRecipe(hashId);
  }
}
</script>
</body>
</html>
